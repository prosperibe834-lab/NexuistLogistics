<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexuistTrack — Logistics Management Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/about.css">
</head>
<body>

    <div id="nxPreloader" class="nx-preloader">
        <div class="nx-preloader-content">
            <div class="nx-loader-radar">
                <div class="nx-radar-pulse"></div>
                <i class='bx bx-radar nx-radar-icon'></i>
            </div>
            <h1 class="nx-preloader-text">
                Nexuist<span class="gradient-text">Track</span>
            </h1>
            <div class="nx-progress-bar-wrapper">
                <div class="nx-progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <header class="nx-header">
        <nav class="nx-navbar">
            <a href="index.html" class="nx-logo-container">
                <img src="assets/images/NexuistTracking Logo.png" alt="NexuistTrack Logo" class="nx-logo">
                <span class="nx-logo-text">Nexuist<span class="gradient-text">Track</span></span>
            </a>

            <ul class="nx-nav-menu" id="navMenu">
                <li class="nx-nav-item">
                    <a href="index.html" class="nx-nav-link">
                        <i class='bx bx-grid-alt'></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nx-nav-item">
                    <a href="services.html" class="nx-nav-link">
                        <i class='bx bx-package'></i>
                        <span>Services</span>
                    </a>
                </li>
                <li class="nx-nav-item">
                    <a href="about.html" class="nx-nav-link">
                        <i class='bx bx-info-circle'></i>
                        <span>About</span>
                    </a>
                </li>
                <li class="nx-nav-item">
                    <a href="contact.html" class="nx-nav-link">
                        <i class='bx bx-support'></i>
                        <span>Contact</span>
                    </a>
                </li>
            </ul>

            <div class="nx-nav-actions">
                <button id="themeToggle" class="nx-theme-btn" aria-label="Toggle Interface Theme">
                    <i class='bx bx-moon theme-icon'></i>
                </button>
                <a href="track.html" class="nx-btn-secondary">
                    <i class='bx bx-radar'></i>
                    <span>Track Shipment</span>
                </a>
                <a href="quote.html" class="nx-btn-primary">
                    <span>Get a Quote</span> 
                    <i class='bx bx-right-arrow-alt'></i>
                </a>
                
                <button class="nx-hamburger" id="menuToggle" aria-label="Open Mobile Menu">
                    <i class='bx bx-menu-alt-right'></i>
                </button>
            </div>
        </nav>
    </header>

    <div class="nx-global-translator" id="nxTranslator">
        <button class="nx-trans-trigger" aria-label="Switch Language">
            <span class="nx-active-flag">🇺🇸</span>
            <span class="nx-active-text">English</span>
            <i class='bx bx-chevron-up'></i>
        </button>
        
        <div class="nx-trans-menu">
            <div class="nx-trans-search">
                <i class='bx bx-search'></i>
                <input type="text" id="nxLangSearch" placeholder="Search language...">
            </div>
            <ul id="nxContainer"></ul>
        </div>
    </div>



    <div id="google_core_translate_widget" style="display: none;"></div>

    <script type="text/javascript">
        window.googleTranslateReady = false;
        
        function googleTranslateElementInit() {
            try {
                new google.translate.TranslateElement({
                    pageLanguage: 'en',
                    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                    autoDisplay: false
                }, 'google_core_translate_widget');
                window.googleTranslateReady = true;
                console.log('Google Translate initialized successfully');
            } catch (e) {
                console.error('Google Translate init error:', e);
                setTimeout(googleTranslateElementInit, 1000);
            }
        }
    </script>
 
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script src="assets/js/about.js"></script>

  

</body>
</html>
